<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Mavie</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card hero">
      <p class="eyebrow">Projeto Disciplina DevOps</p>
      <h1>Focus Mavie</h1>
      <p class="subtitle">Gestor de tarefas - timer e pomodoro</p>
    </section>

    <section class="card timer-card">
      <h2 id="modeLabel">Modo: Foco</h2>
      <div id="timer" class="timer">25:00</div>

      <div class="actions">
        <button id="startBtn">Iniciar</button>
        <button id="pauseBtn">Pausar</button>
        <button id="resetBtn">Resetar</button>
        <button id="switchBtn">Trocar modo</button>
      </div>

      <p class="hint">Foco: 25 min · Pausa: 5 min</p>
    </section>

    <section class="card tasks-card">
      <h2>Tarefas</h2>
      <div class="task-form">
        <input id="taskInput" type="text" placeholder="Ex: Adicione sua tarefa" />
        <button id="addTaskBtn">Adicionar</button>
      </div>
      <ul id="taskList" class="task-list"></ul>
    </section>
  </main>

  <script src="src/core.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
